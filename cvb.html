<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVB 计算器</title>
    <link rel="icon" href="img/favicon.ico?v=1" type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        /* 基础样式 */
        body {
            background-color: #051427;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: #9ca3af;
        }

        /* 全局自定义滑动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.5), rgba(96, 165, 250, 0.5));
            border-radius: 4px;
            border: 2px solid rgba(5, 20, 39, 0.5);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.7), rgba(96, 165, 250, 0.7));
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
        }
        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* 输入框样式 */
        .input {
            background-color: #0a1e36 !important;
            color: #d1d5db !important;
            border: 1px solid rgba(59, 130, 246, 0.25) !important;
        }
        .input:focus {
            background-color: #0c2140 !important;
            outline: none !important;
            border-color: #93c5fd !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5) !important;
        }

        /* 滑块样式 */
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #0a1e36;
            outline: none;
            transition: all 0.2s ease;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #93c5fd;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.7);
        }
        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #93c5fd;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
            border: none;
        }
        .slider::-moz-range-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.7);
        }

        /* 内容容器样式 */
        .bg-gray-800\/50 {
            background-color: rgba(17, 24, 39, 0.5) !important;
        }
        .bg-gray-700\/50 {
            background-color: rgba(55, 65, 81, 0.5) !important;
        }
        .text-gray-300 {
            color: #d1d5db !important;
        }
        .text-gray-400 {
            color: #9ca3af !important;
        }

        /* 警告信息样式 */
        .disclaimer {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        .disclaimer ol {
            margin: 0;
            padding-left: 20px;
        }
        .disclaimer li {
            margin-bottom: 4px;
            color: #fcd34d;
        }

        /* 结果框样式 */
        .cvb-result-box {
            background-color: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        th {
            background-color: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
        }
        tr:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }
    </style>
    <!-- Custom JS -->
    <script src="../js/common.js"></script>
<script src="../js/cvb.js"></script>
</head>
<body class="bg-gray-900 text-gray-300">
<!-- 统一导航栏组件 -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">WE1ZARD</a>
        <div class="nav-menu">
            <a href="blog.html" target="_blank" class="nav-link">教程</a>
            <a href="tool.html" target="_blank" class="nav-link">工具</a>
            <a href="update.html" target="_blank" class="nav-link">更新</a>
            <a href="https://tally.so/r/0Q7qYj" target="_blank" class="nav-link">反馈</a>
            <div class="nav-avatar">
                <a href="about.html" target="_blank">
                    <img src="img/avatar.png" class="avatar-icon" alt="Avatar">
                </a>
            </div>
        </div>
    </div>
</nav>

    <!-- 页面头部 -->
    <header class="py-8">
        <div class="max-w-3xl mx-auto px-4">
            <div class="flex justify-center">
                <img src="../img/aurora.svg" alt="WE1ZARD" width="184" height="40">
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="max-w-4xl mx-auto px-4 py-8">

        <!-- Content Box -->
        <div class="bg-gray-800/50 rounded-xl p-6 shadow-lg text-sm">

            <!-- Risk Disclaimer -->
            <div class="disclaimer">
                <ol>
                    <li>请自行承担任何由于使用导致的风险和后果.</li>
                    <li>计算结果仅供参考, 基于 HOC 数据推算.</li>
                </ol>
            </div>
            

            <!-- Frequency Selection Slider -->
            <div class="flex flex-col items-center mb-6 w-full">
                <div class="flex items-center w-full max-w-4xl">
                    <span class="text-gray-400 mr-2 min-w-[60px]">CPU:</span>
                    <input type="range" id="frequencySlider" class="flex-grow slider">
                    <span id="currentFrequency" class="text-gray-300 ml-2 min-w-[80px] text-right">1020 MHz</span>
                </div>
            </div>

            <!-- Input Fields -->
            <div class="input-section grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-3 mb-6 max-w-[24rem] mx-auto">
                <input type="text" id="c0" placeholder="c0: 853926" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                <input type="text" id="c1" placeholder="c1: -20775" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                <input type="text" id="c2" placeholder="c2: 113" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                <input type="text" id="speedo" placeholder="cpu speedo: 1600" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                <input type="text" id="Scale" placeholder="scale: 102.4" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                <input type="text" id="cvb_mv" placeholder="cvb: nil" oninput="calcCVB()" 
                       class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                
                <!-- Table Selection -->
                <div id="tableSelectContainer">
                    <select id="tableSelect" onchange="switchTable()" class="w-full px-4 py-2 bg-gray-700/50 rounded-lg text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/50 input">
                        <!-- 表格选项将在数据加载时动态添加 -->
                    </select>
                </div>
                
                <!-- Result Box -->
                <div>
                    <div id="resultBox" class="w-full h-full cvb-control-item cvb-result-box hidden" style="display: none;">
                        <div id="resultVal"></div>
                    </div>
                </div>
            </div>
            
            <!-- Batch Results Box -->
            <div id="batchResultBox" class="mt-2 max-w-[24rem] mx-auto hidden overflow-x-auto" style="display: none;">
                <div id="batchResults"></div>
            </div>
            
            <!-- Voltage Curve Chart -->
            <div id="chartBox" class="mt-6 max-w-[40rem] mx-auto hidden">
                <canvas id="voltageChart" width="400" height="200"></canvas>
            </div>

        </div>
    </div>

    <style>
        /* Make batch results table responsive */
        #batchResults table {
            width: 100%;
        }
        
        /* Chart styles */
        #chartBox {
            padding: 1rem;
            background-color: rgba(75, 85, 99, 0.2);
            border-radius: 0.5rem;
        }
    </style>
    
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- 统一Footer组件 -->
<footer class="footer">
    <div class="footer-content">
        <p>&copy; 2026 WE1ZARD. All rights reserved.</p>
        <div class="footer-links">
            <a href="https://github.com/we1zard" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://space.bilibili.com/3595105" target="_blank"><i class="fab fa-bilibili"></i></a>
            <a href="https://qm.qq.com/q/TzIMB20la2" target="_blank"><i class="fab fa-qq"></i></a>
            <a href="https://afdian.com/a/weizard/plan" target="_blank"><i class="fas fa-heart"></i></a>
        </div>
    </div>
</footer>

</body>
</html>
