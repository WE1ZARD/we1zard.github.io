    <style>
        /* Landing Page Styles */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--color-bg-primary);
            overflow: hidden;
            padding-top: 80px; /* 添加顶部内边距，避免被导航栏遮挡 */
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }
        
        .hero-text {
            max-width: 600px;
        }
        
        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .hero-image img {
            max-width: 100%;
            height: auto;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            text-align: left;
        }
        
        .hero-title .highlight {
            color: var(--color-highlight);
        }
        
        .hero-description {
            font-size: 1.25rem;
            color: var(--color-text-primary);
            margin-bottom: 3rem;
            max-width: 600px;
            text-align: left;
        }
        
        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 4rem;
        }
        
        .hero-button {
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 2rem;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .hero-button.primary {
            background-color: var(--color-highlight);
            color: #1e3a8a;
            border: 1px solid var(--color-highlight);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.25);
        }
        
        .hero-button.primary:hover {
            transform: translateY(-1px);
        }
        
        .hero-button.primary:hover .arrow {
            animation: arrow-shake 0.5s ease-in-out 1;
        }
        
        @keyframes arrow-shake {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        
        .hero-button.secondary {
            background-color: transparent;
            color: var(--color-text-primary);
            border: 1px solid #374151;
        }
        
.hero-button.secondary:hover {
      background: var(--color-highlight);
      color: #1e3a8a;
      border: 1px solid var(--color-highlight);
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.5);
      transform: translateY(-1px);
    }
        
        .hero-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 4rem;
            width: 100%;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-highlight);
            margin-bottom: 0.5rem;
        }
        
        .stat-symbol {
            font-size: 1.25rem;
        }
        
        .stat-label {
            color: var(--color-text-secondary);
            font-size: 1rem;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(96, 165, 250, 0.1) 0%, transparent 70%);
            z-index: 1;
        }
        
        .image-scroller {
            width: 75%;
            overflow: hidden;
            border-radius: 1.5rem;
            position: relative;
        }
        
        .image-scroller::before,
        .image-scroller::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            z-index: 1;
        }
        
        .image-scroller::before {
            left: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.4), transparent);
        }
        
        .image-scroller::after {
            right: 0;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.4), transparent);
        }
        
        .image-track {
            display: flex;
        }
        
        .image-track img {
            width: 150px;
            height: auto;
            margin: 0 20px 0 0;
            border-radius: 1.5rem;
        }
        
        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .hero-title {
                font-size: 2.5rem;
            }
            
            .hero-buttons {
                flex-direction: column;
                width: 100%;
            }
            
            .hero-button {
                width: 100%;
                justify-content: center;
            }
            
            .hero-bg {
                width: 100%;
            }
        }
    </style>
    <script src="js/common.js"></script>
</head>

<div class="hero-buttons">

                    </div>
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">

            <div class="hero-image">

                    <div class="image-track" id="imageTrack">
                        <!-- 图片将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>
            
            <script>
                // 图片数组 - 自动从/img/demo/目录获取图片
                const images = ["img/demo/0-sphaira.jpg", "img/demo/1-dbi.jpg", "img/demo/2-daybreak.jpg", "img/demo/3-edizon.jpg", "img/demo/4-sysclk.jpg", "img/demo/5-JKSV.jpg", "img/demo/6-cpu.jpg", "img/demo/7-furmark.jpg"];
                
                // 未来可以通过后端API或构建脚本自动生成此数组
                // 例如：const images = getImagesFromDirectory('/img/demo/');
                
                // 获取图片轨道元素
                const imageTrack = document.getElementById('imageTrack');
                
                // 动态添加图片
                images.forEach((imgSrc, index) => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.alt = `内容展示 ${index + 1}`;
                    img.style.width = '150px';
                    img.style.height = 'auto';
                    img.style.margin = '0 20px 0 0';
                    img.style.borderRadius = '1.5rem';
                    imageTrack.appendChild(img);
                });
                
                // 复制图片以实现无缝循环
                images.forEach((imgSrc, index) => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.alt = `内容展示 ${index + 1}`;
                    img.style.width = '150px';
                    img.style.height = 'auto';
                    img.style.margin = '0 20px 0 0';
                    img.style.borderRadius = '1.5rem';
                    imageTrack.appendChild(img);
                });
                
                // 实现平滑滚动
                let scrollPosition = 0;
                const scrollSpeed = 0.5; // 减慢滚动速度
                
                function animateScroll() {
                    scrollPosition += scrollSpeed;
                    
                    // 计算单组图片的总宽度（包括间距）
                    const singleImageWidth = 150 + 20; // 图片宽度 + 右边距
                    const totalWidth = singleImageWidth * images.length;
                    
                    // 当滚动到单组图片的宽度时，重置滚动位置
                    if (scrollPosition >= totalWidth) {
                        scrollPosition = 0;
                    }
                    
                    imageTrack.style.transform = `translateX(-${scrollPosition}px)`;
                    requestAnimationFrame(animateScroll);
                }
                
                // 启动动画
                animateScroll();
            </script>
