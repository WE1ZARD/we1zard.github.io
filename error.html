<script>
const STORAGE_KEY = 'we1zard_error_codes_cache';
const CACHE_TIMESTAMP_KEY = 'we1zard_error_codes_timestamp';
const CACHE_DURATION = 7 * 24 * 60 * 60 * 1000;

let errorDatabase = [];
let isDataLoaded = false;

const searchInput = document.getElementById('errorSearchInput');
const searchActionBtn = document.getElementById('searchActionBtn');
const initialHint = document.getElementById('initialHint');
const resultsContainer = document.getElementById('errorResults');

function loadFromCache() {
  try {
    const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);
    if (!timestamp) return false;
    
    const age = Date.now() - parseInt(timestamp, 10);
    if (age > CACHE_DURATION) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(CACHE_TIMESTAMP_KEY);
      return false;
    }
    
    const cached = localStorage.getItem(STORAGE_KEY);
    if (cached) {
      errorDatabase = JSON.parse(cached);
      isDataLoaded = true;
      return true;
    }
  } catch (e) {
    console.error('Cache read error:', e);
  }
  return false;
}

function saveToCache(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
  } catch (e) {
    console.error('Cache write error:', e);
  }
}

async function loadErrorData() {
  const hasCache = loadFromCache();
  
  if (hasCache) {
    refreshDataInBackground();
    return;
  }
  
  try {
    const response = await fetch('../data/error_codes.json');
    if (!response.ok) throw new Error('Failed to load');
    errorDatabase = await response.json();
    isDataLoaded = true;
    saveToCache(errorDatabase);
  } catch (error) {
    console.error('Data load error:', error);
  }
}

async function refreshDataInBackground() {
  try {
    const response = await fetch('../data/error_codes.json');
    if (!response.ok) return;
    const newData = await response.json();
    
    if (JSON.stringify(newData) !== JSON.stringify(errorDatabase)) {
      errorDatabase = newData;
      saveToCache(errorDatabase);
      console.log('Data refreshed');
    }
  } catch (e) {
    // 后台刷新失败不影响使用
  }
}

function updateSearchIcon(hasContent) {
  const icon = searchActionBtn.querySelector('i');
  if (hasContent) {
    icon.className = 'fas fa-times';
    searchActionBtn.title = '清除';
  } else {
    icon.className = 'fas fa-search';
    searchActionBtn.title = '搜索';
  }
}

function showInitialState() {
  initialHint.style.display = 'block';
  resultsContainer.style.display = 'none';
  resultsContainer.innerHTML = '';
}

function showResults() {
  initialHint.style.display = 'none';
  resultsContainer.style.display = 'block';
}

function searchError(query) {
  if (!query.trim()) {
    showInitialState();
    return;
  }

  if (!isDataLoaded) {
    resultsContainer.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon"><i class="fas fa-spinner fa-spin"></i></div>
        <p>数据加载中...</p>
      </div>
    `;
    showResults();
    return;
  }

  const lowerQuery = query.toLowerCase();
  const results = errorDatabase.filter(error => {
    const codeMatch = error.code && error.code.toLowerCase().includes(lowerQuery);
    const descMatch = error.description && error.description.toLowerCase().includes(lowerQuery);
    const sectionMatch = error.section && error.section.toLowerCase().includes(lowerQuery);
    const subsectionMatch = error.subsection && error.subsection.toLowerCase().includes(lowerQuery);
    return codeMatch || descMatch || sectionMatch || subsectionMatch;
  });

  if (results.length === 0) {
    showNoResults();
  } else {
    displayResults(results);
  }
}

function displayResults(results) {
  let html = `<div class="results-stats">找到 <span>${results.length}</span> 个结果</div>`;

  results.forEach(error => {
    const description = error.description || '';
    const section = error.section || '未知';
    const subsection = error.subsection || '';

    html += `
      <div class="error-result-card">
        <div class="error-code-header">
          <span class="error-code">${escapeHtml(error.code)}</span>
          <span class="error-section-tag">${escapeHtml(section)}</span>
        </div>
        ${subsection ? `<div class="error-subsection">${escapeHtml(subsection)}</div>` : ''}
        ${description ? `<div class="error-description">${escapeHtml(description)}</div>` : ''}
      </div>
    `;
  });

  resultsContainer.innerHTML = html;
  showResults();
}

function showNoResults() {
  resultsContainer.innerHTML = `
    <div class="no-results">
      <div class="no-results-icon"><i class="fas fa-search"></i></div>
      <p>未找到相关错误代码</p>
    </div>
  `;
  showResults();
}

function showErrorState() {
  resultsContainer.innerHTML = `
    <div class="error-state">
      <div class="error-state-icon"><i class="fas fa-exclamation-triangle"></i></div>
      <p>数据加载失败，请刷新页面重试</p>
    </div>
  `;
  showResults();
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

searchInput.addEventListener('input', (e) => {
  const query = e.target.value;
  updateSearchIcon(query.length > 0);
  searchError(query);
});

searchActionBtn.addEventListener('click', () => {
  const hasContent = searchInput.value.length > 0;
  if (hasContent) {
    searchInput.value = '';
    updateSearchIcon(false);
    searchInput.focus();
    showInitialState();
  }
});

window.addEventListener('DOMContentLoaded', () => {
  searchInput.focus();
  loadErrorData();
});
</script>
